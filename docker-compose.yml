services:
  db:
    image: postgres:16-alpine
    container_name: plantcare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: plantcare
      POSTGRES_USER: plantcare_user
      POSTGRES_PASSWORD: plantcare_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantcare_user -d plantcare"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: plantcare_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://plantcare_user:plantcare_password@db:5432/plantcare
      SECRET_KEY: super_secret_key_for_dev
      DEBUG: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: plantcare_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data: